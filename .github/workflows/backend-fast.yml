name: Backend Fast Checks

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-fast.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"

jobs:
  linting:
    name: Python Linting (pylint + flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd backend && pip install -r requirements.txt
          pip install pylint flake8

      - name: Run flake8
        run: cd backend && flake8 app/ --max-line-length=120 --extend-ignore=E501
        continue-on-error: true

      - name: Report linting status
        if: always()
        run: echo "ℹ️ Linting check completed (warnings allowed)"

  flask-startup:
    name: Flask App Startup Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd backend && pip install -r requirements.txt

      - name: Check Flask app initialization
        run: |
          cd backend
          python -c "from app import create_app; app = create_app(); print('✅ Flask app initialized successfully')"

      - name: Report app check status
        if: always()
        run: echo "✅ Flask app check completed"

  summary:
    name: Backend Fast Checks Summary
    runs-on: ubuntu-latest
    needs: [linting, flask-startup]
    if: always()
    steps:
      - name: Report summary
        run: |
          echo "## Backend Fast Checks Summary"
          echo "- Linting: ${{ needs.linting.result }}"
          echo "- Flask startup: ${{ needs.flask-startup.result }}"
