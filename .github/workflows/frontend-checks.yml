name: Frontend Checks (TypeScript + Linting)

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-checks.yml"
  push:
    branches:
      - main
    paths:
      - "frontend/**"

jobs:
  typescript-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package.json"

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Run TypeScript check
        run: cd frontend && npx tsc --noEmit

      - name: Report status
        if: always()
        run: echo "✅ TypeScript check completed"

  linting:
    name: ESLint & Next.js Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package.json"

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Run TypeScript check (next lint removed in Next.js 16)
        run: cd frontend && npx tsc --noEmit
        continue-on-error: true

      - name: Report linting status
        if: always()
        run: echo "ℹ️ Linting check completed (warnings allowed)"

  build-check:
    name: Production Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package.json"

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Run production build
        run: cd frontend && npm run build
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test_db"
          DIRECT_DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test_db"
          DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/test_db"
          NEXT_PUBLIC_SUPABASE_URL: "https://test.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "test-anon-key"
          SUPABASE_SERVICE_ROLE_KEY: "test-service-role-key"
          NEXT_PUBLIC_BACKEND_URL: "http://localhost:10000"
          NEXT_PUBLIC_DIAGNOSIS_MODE: "adaptive"
          NEXT_PUBLIC_MAPBOX_TOKEN: "test-mapbox-token"

      - name: Report build status
        if: always()
        run: echo "✅ Build check completed"

  summary:
    name: Frontend Checks Summary
    runs-on: ubuntu-latest
    needs: [typescript-check, linting, build-check]
    if: always()
    steps:
      - name: Report summary
        run: |
          echo "## Frontend Checks Summary"
          echo "- TypeScript: ${{ needs.typescript-check.result }}"
          echo "- Linting: ${{ needs.linting.result }}"
          echo "- Build: ${{ needs.build-check.result }}"
