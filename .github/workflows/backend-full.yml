name: Backend Full Tests

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "backend/**"
      - ".github/workflows/backend-full.yml"

jobs:
  pytest:
    name: Python Tests (pytest)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd backend && pip install -r requirements.txt

      - name: Run pytest
        run: python -m pytest tests/backend/tests/ -v --tb=short
        env:
          PYTHONPATH: backend
        continue-on-error: true

      - name: Report test status
        if: always()
        run: echo "✅ pytest completed for Python ${{ matrix.python-version }}"

  linting:
    name: Python Linting (pylint + flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd backend && pip install -r requirements.txt
          pip install pylint flake8

      - name: Run flake8
        run: cd backend && flake8 app/ --max-line-length=120 --extend-ignore=E501
        continue-on-error: true

      - name: Report linting status
        if: always()
        run: echo "ℹ️ Linting check completed (warnings allowed)"

  flask-startup:
    name: Flask App Startup Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd backend && pip install -r requirements.txt

      - name: Check Flask app initialization
        run: |
          cd backend
          python -c "from app import create_app; app = create_app(); print('✅ Flask app initialized successfully')"

      - name: Report app check status
        if: always()
        run: echo "✅ Flask app check completed"

  summary:
    name: Backend Full Tests Summary
    runs-on: ubuntu-latest
    needs: [pytest, linting, flask-startup]
    if: always()
    steps:
      - name: Report summary
        run: |
          echo "## Backend Full Tests Summary"
          echo "- pytest: ${{ needs.pytest.result }}"
          echo "- Linting: ${{ needs.linting.result }}"
          echo "- Flask startup: ${{ needs.flask-startup.result }}"
